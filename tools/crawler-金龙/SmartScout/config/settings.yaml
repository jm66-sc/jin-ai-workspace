# SmartScout - 公开配置
# 此文件包含非敏感配置，可提交到版本控制

# 项目默认配置
project:
  default_page_limit: 10           # 默认抓取页数（用户要求10页）
  default_concurrency: 3          # 默认并发数
  results_per_page: 20            # 每页显示结果数

# 侦察阶段配置
scout:
  sample_size: 50                 # 侦察抓取条数
  max_suggestions: 10             # 最大建议关键词数
  confidence_threshold: 0.7       # 建议置信度阈值
  sample_file: "simple_bids_50_20260211_032958.json"  # 规则扩充样本文件（备用，优先使用动态抓取）

# 生产者配置
producer:
  max_pages: 10                   # 最大翻页数
  items_per_page: 20              # 每页项目数预期
  request_delay: 1.0              # 请求延迟(秒)

# 消费者配置
consumer:
  batch_size: 10                  # 批处理大小
  max_detail_length: 10000        # 详情页最大长度(字符)
  field_extraction_timeout: 30    # 字段提取超时(秒)

# 文件队列配置
queue:
  file_path: "data/temp/tasks.jsonl"  # 任务队列文件路径
  max_file_size_mb: 100           # 最大文件大小(MB)
  backup_count: 3                 # 备份文件数量

# 数据库配置
database:
  path: "data/database.sqlite"    # SQLite数据库路径
  backup_enabled: true            # 是否启用备份
  backup_interval_hours: 24       # 备份间隔(小时)

# 日志配置
logging:
  level: "INFO"                   # 日志级别
  file_path: "logs/smartscout.log" # 日志文件路径
  max_file_size_mb: 50            # 日志文件最大大小
  backup_count: 5                 # 日志备份数量

# 界面配置
ui:
  refresh_interval: 5             # 界面刷新间隔(秒)
  max_display_rows: 100           # 最大显示行数
  theme: "light"                  # 界面主题

# 导出配置
export:
  default_format: "csv"           # 默认导出格式
  csv_delimiter: ","              # CSV分隔符
  excel_sheet_name: "采购公告"     # Excel工作表名称